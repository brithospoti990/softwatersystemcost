<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
<link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@600;700&amp;family=Source+Sans+3:wght@400;600&amp;family=IBM+Plex+Mono:wght@400;500&amp;display=swap" rel="stylesheet">
<style>
  body { margin: 0; background: #FAFAF7; color: #16303F; font-family: "Source Sans 3", "Helvetica Neue", Arial, sans-serif; }
  a { color: #16303F; } a:hover { color: #1F7A5C; }
</style>
</helmet>
<div style="background: #FFFFFF; border: 1px solid #D9DED9; border-radius: 0; box-shadow: 0 1px 2px rgba(22,48,63,.05), 0 16px 40px -20px rgba(22,48,63,.18); overflow-x: auto;">
  <div style="display: flex; align-items: baseline; gap: 16px; padding: 20px 24px 0 24px; border-top: 3px solid #16303F;">
    <span style="font-family: 'Zilla Slab', Georgia, serif; font-weight: 600; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: #5B6B75;">Quote Sheet</span>
    <span style="font-family: 'Zilla Slab', Georgia, serif; font-weight: 600; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: #16303F;">{{ title }}</span>
  </div>
  <table style="width: 100%; border-collapse: collapse; margin-top: 16px; min-width: 460px;">
    <caption style="position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0);">{{ caption }}</caption>
    <thead>
      <tr>
        <th scope="col" style="text-align: left; font-size: 13px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #5B6B75; padding: 8px 24px; border-bottom: 1px solid #D9DED9;">Item</th>
        <th scope="col" style="text-align: right; font-size: 13px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #5B6B75; padding: 8px 12px 8px 24px; border-bottom: 1px solid #D9DED9;">Low</th>
        <th scope="col" style="text-align: right; font-size: 13px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #5B6B75; padding: 8px 24px 8px 24px; border-bottom: 1px solid #D9DED9;">High</th>
      </tr>
    </thead>
    <tbody>
      <sc-for list="{{ frows }}" as="row" hint-placeholder-count="4">
        <tr>
          <td style="padding: 10px 24px; font-size: 16px; color: #16303F; border-bottom: 1px solid #D9DED9;">{{ row.item }}</td>
          <td style="padding: 10px 12px 10px 24px; text-align: right; font-family: 'IBM Plex Mono', Consolas, monospace; font-variant-numeric: tabular-nums; font-size: 15px; color: #16303F; border-bottom: 1px solid #D9DED9;">{{ row.low }}</td>
          <td style="padding: 10px 24px; text-align: right; font-family: 'IBM Plex Mono', Consolas, monospace; font-variant-numeric: tabular-nums; font-size: 15px; color: #16303F; border-bottom: 1px solid #D9DED9;">{{ row.high }}</td>
        </tr>
      </sc-for>
      <tr>
        <td style="padding: 12px 24px; font-size: 15px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: #16303F; border-top: 3px double #16303F;">{{ totalLabel }}</td>
        <td style="padding: 12px 12px 12px 24px; text-align: right; font-family: 'IBM Plex Mono', Consolas, monospace; font-variant-numeric: tabular-nums; font-weight: 500; font-size: 16px; color: #1F7A5C; border-top: 3px double #16303F;">{{ totalLow }}</td>
        <td style="padding: 12px 24px; text-align: right; font-family: 'IBM Plex Mono', Consolas, monospace; font-variant-numeric: tabular-nums; font-weight: 500; font-size: 16px; color: #1F7A5C; border-top: 3px double #16303F;">{{ totalHigh }}</td>
      </tr>
    </tbody>
  </table>
  <div style="display: flex; gap: 16px; align-items: center; padding: 12px 24px 16px 24px; border-top: 1px solid #D9DED9;">
    <span style="font-family: 'IBM Plex Mono', Consolas, monospace; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: #5B6B75; border: 1px solid #D9DED9; border-radius: 999px; background: #FFFFFF; padding: 4px 12px;">Data updated · {{ stamp }}</span>
    <a href="{{ sourcesHref }}" style="font-size: 13px; color: #5B6B75;">Sources ↓</a>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: &quot;920px&quot;, &quot;height&quot;: &quot;auto&quot; },
  &quot;title&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Salt-Based Softener, 3-Bath Home&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;rows&quot;: { &quot;editor&quot;: null, &quot;tsType&quot;: &quot;{item: string, low: number, high: number}[]&quot; },
  &quot;totalLabel&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Total installed&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;stamp&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Jul 2026&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;sourcesHref&quot;: { &quot;editor&quot;: null, &quot;tsType&quot;: &quot;string&quot; }
}">
class Component extends DCLogic {
  renderVals() {
    const rows = this.props.rows ?? [
      { item: "Softener unit (32k grain)", low: 600, high: 1500 },
      { item: "Installation labor", low: 200, high: 500 },
      { item: "Bypass valve & fittings", low: 40, high: 120 },
      { item: "Loop run (if none exists)", low: 600, high: 2000 },
    ];
    const f = (n) => "$" + Math.round(n).toLocaleString("en-US");
    const title = this.props.title ?? "Salt-Based Softener, 3-Bath Home";
    return {
      title,
      caption: "Quote Sheet: " + title + " — itemized low and high cost estimates",
      frows: rows.map((r) => ({ item: r.item, low: f(r.low), high: f(r.high) })),
      totalLabel: this.props.totalLabel ?? "Total installed",
      totalLow: f(rows.reduce((s, r) => s + r.low, 0)),
      totalHigh: f(rows.reduce((s, r) => s + r.high, 0)),
      stamp: this.props.stamp ?? "Jul 2026",
      sourcesHref: this.props.sourcesHref ?? "#sources",
    };
  }
}
</script>
</body>
</html>
