<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
<link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@600;700&amp;family=Source+Sans+3:wght@400;600&amp;family=IBM+Plex+Mono:wght@400;500&amp;display=swap" rel="stylesheet">
<style>
  body { margin: 0; background: #FAFAF7; color: #16303F; font-family: "Source Sans 3", "Helvetica Neue", Arial, sans-serif; }
  a { color: #16303F; } a:hover { color: #1F7A5C; }
</style>
</helmet>
<div style="background: #FFFFFF; border: 1px solid #D9DED9; border-left: 3px solid #E8A13D; border-radius: 10px; padding: 28px 32px; box-shadow: 0 1px 2px rgba(22,48,63,.05), 0 16px 40px -20px rgba(22,48,63,.18);">
  <div style="font-size: 12px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #5B6B75;">{{ eyebrow }}</div>
  <p style="margin: 8px 0 16px 0; font-size: 17px; line-height: 1.55; color: #16303F; max-width: 640px;">{{ body }}</p>
  <a href="{{ href }}" rel="sponsored nofollow noopener" target="_blank" style="display: inline-block; background: #1F7A5C; color: #FAFAF7; font-size: 16px; font-weight: 600; text-decoration: none; padding: 12px 24px; border-radius: 10px; transition: background 150ms ease;" style-hover="background: #16303F; color: #FAFAF7;">{{ buttonLabel }} →</a>
  <div style="margin-top: 12px; font-size: 14px; color: #5B6B75;">{{ footnote }}</div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: &quot;720px&quot;, &quot;height&quot;: &quot;auto&quot; },
  &quot;eyebrow&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;The factory-direct alternative&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;body&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Skip the in-home quote. SpringWell publishes its softener prices — no dealer visit, DIY-friendly install, 6-month money-back guarantee.&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;buttonLabel&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Check current SpringWell price&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;href&quot;: { &quot;editor&quot;: null, &quot;tsType&quot;: &quot;string&quot; },
  &quot;footnote&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Lifetime warranty on tanks &amp; valves · ships free&quot;, &quot;tsType&quot;: &quot;string&quot; }
}">
class Component extends DCLogic {
  renderVals() {
    return {
      eyebrow: this.props.eyebrow ?? "The factory-direct alternative",
      body: this.props.body ?? "Skip the in-home quote. SpringWell publishes its softener prices — no dealer visit, DIY-friendly install, 6-month money-back guarantee.",
      buttonLabel: this.props.buttonLabel ?? "Check current SpringWell price",
      href: this.props.href ?? "https://www.tkqlhce.example/click?affid=REPLACE_AFFID&oid=oid-ss1-softener",
      footnote: this.props.footnote ?? "Lifetime warranty on tanks & valves · ships free",
    };
  }
}
</script>
</body>
</html>
